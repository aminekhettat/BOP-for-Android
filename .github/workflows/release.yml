name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Se déclenche lorsqu'un tag de version est créé, ex: v1.0.0

jobs:
  build_and_sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Décodage du Keystore stocké en texte Base64 dans les secrets GitHub
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.keystore

      # Compilation et Signature de l'AAB (Android App Bundle)
      - name: Build and Sign Release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_FILE: "release-keystore.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Publication de l'artefact (AAB prêt pour le Play Store)
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: bop-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
